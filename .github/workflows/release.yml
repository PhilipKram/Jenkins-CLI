name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Ensure homebrew-tap repo exists
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping homebrew-tap repo check"
            exit 0
          fi
          if ! gh repo view PhilipKram/homebrew-tap >/dev/null 2>&1; then
            gh repo create PhilipKram/homebrew-tap --public \
              --description "Homebrew formulae for PhilipKram projects"
          fi

      - name: Determine goreleaser args
        id: goreleaser
        env:
          HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping homebrew formula publish"
            echo "args=release --clean --skip=homebrew" >> "$GITHUB_OUTPUT"
          else
            echo "args=release --clean" >> "$GITHUB_OUTPUT"
          fi

      - uses: goreleaser/goreleaser-action@v6
        with:
          args: ${{ steps.goreleaser.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Notify Microsoft Teams
        if: success()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not set, skipping Teams notification"
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME}"
          RELEASE_URL="https://github.com/PhilipKram/Jenkins-CLI/releases/tag/${VERSION}"

          # Extract release notes from GitHub release
          RELEASE_BODY=$(gh release view "${VERSION}" --json body --jq '.body' 2>/dev/null || echo "")

          # Parse features, fixes, and other changes into separate sections
          FEATURES=""
          FIXES=""
          OTHERS=""

          if [ -n "$RELEASE_BODY" ]; then
            CURRENT_SECTION=""
            while IFS= read -r line; do
              case "$line" in
                *"New Features"*) CURRENT_SECTION="features" ;;
                *"Bug Fixes"*)    CURRENT_SECTION="fixes" ;;
                *"Performance"*|*"Other Changes"*) CURRENT_SECTION="others" ;;
                \*\ *)
                  # Clean: strip commit hashes, PR refs stay
                  clean=$(echo "$line" | sed 's/^\* [a-f0-9]\{7,40\} /• /' | sed 's/^\* /• /' | sed 's/"/\\"/g')
                  case "$CURRENT_SECTION" in
                    features) FEATURES="${FEATURES}${clean}\\n" ;;
                    fixes)    FIXES="${FIXES}${clean}\\n" ;;
                    *)        OTHERS="${OTHERS}${clean}\\n" ;;
                  esac
                  ;;
              esac
            done <<< "$RELEASE_BODY"
          fi

          # Build changelog sections for the card
          CHANGELOG_BLOCKS=""

          if [ -n "$FEATURES" ]; then
            CHANGELOG_BLOCKS="${CHANGELOG_BLOCKS}"'
            ,{
              "type": "RichTextBlock",
              "spacing": "Small",
              "inlines": [
                {"type": "TextRun", "text": "New Features", "weight": "Bolder", "size": "Small", "color": "Good"}
              ]
            },
            {
              "type": "TextBlock",
              "text": "'"${FEATURES%\\n}"'",
              "wrap": true,
              "size": "Small",
              "spacing": "None"
            }'
          fi

          if [ -n "$FIXES" ]; then
            CHANGELOG_BLOCKS="${CHANGELOG_BLOCKS}"'
            ,{
              "type": "RichTextBlock",
              "spacing": "Small",
              "inlines": [
                {"type": "TextRun", "text": "Bug Fixes", "weight": "Bolder", "size": "Small", "color": "Attention"}
              ]
            },
            {
              "type": "TextBlock",
              "text": "'"${FIXES%\\n}"'",
              "wrap": true,
              "size": "Small",
              "spacing": "None"
            }'
          fi

          if [ -n "$OTHERS" ]; then
            CHANGELOG_BLOCKS="${CHANGELOG_BLOCKS}"'
            ,{
              "type": "RichTextBlock",
              "spacing": "Small",
              "inlines": [
                {"type": "TextRun", "text": "Other Changes", "weight": "Bolder", "size": "Small"}
              ]
            },
            {
              "type": "TextBlock",
              "text": "'"${OTHERS%\\n}"'",
              "wrap": true,
              "size": "Small",
              "spacing": "None"
            }'
          fi

          # Fallback if no sections were parsed
          if [ -z "$CHANGELOG_BLOCKS" ]; then
            FALLBACK=$(echo "$RELEASE_BODY" \
              | sed 's/^[a-f0-9]\{7,40\} //' \
              | sed 's/^\* [a-f0-9]\{7,40\} /* /' \
              | grep -v '^## \|^---\|^Changelog$\|^Welcome\|^Full Changelog\|^$\|^###\|^```\|^brew \|^npx \|^Binary' \
              | sed 's/^\* /• /' \
              | head -15 \
              | sed 's/"/\\"/g; s/$/\\n/' \
              | tr -d '\n')
            if [ ${#FALLBACK} -gt 800 ]; then
              FALLBACK="${FALLBACK:0:797}..."
            fi
            CHANGELOG_BLOCKS='
            ,{
              "type": "TextBlock",
              "text": "'"${FALLBACK:-See release page for details.}"'",
              "wrap": true,
              "size": "Small",
              "spacing": "Small"
            }'
          fi

          # Count release assets
          ASSET_COUNT=$(gh release view "${VERSION}" --json assets --jq '.assets | length' 2>/dev/null || echo "0")

          # Get previous tag for comparison
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${VERSION}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            COMMIT_COUNT=$(git rev-list --count "${PREV_TAG}..${VERSION}" 2>/dev/null || echo "?")
            COMPARE_INFO="${COMMIT_COUNT} commits since ${PREV_TAG}"
            COMPARE_URL="https://github.com/PhilipKram/Jenkins-CLI/compare/${PREV_TAG}...${VERSION}"
          else
            COMPARE_INFO="Initial release"
            COMPARE_URL="${RELEASE_URL}"
          fi

          # Get release date
          RELEASE_DATE=$(date -u +"%B %d, %Y")

          curl -s -X POST "$TEAMS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "message",
              "attachments": [{
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.4",
                  "msteams": {
                    "width": "Full"
                  },
                  "body": [
                    {
                      "type": "Container",
                      "style": "accent",
                      "bleed": true,
                      "items": [
                        {
                          "type": "ColumnSet",
                          "columns": [
                            {
                              "type": "Column",
                              "width": "stretch",
                              "items": [
                                {
                                  "type": "TextBlock",
                                  "text": "jenkins-cli",
                                  "size": "Small",
                                  "weight": "Bolder",
                                  "color": "Light"
                                },
                                {
                                  "type": "TextBlock",
                                  "text": "'"${VERSION}"'",
                                  "size": "ExtraLarge",
                                  "weight": "Bolder",
                                  "color": "Light",
                                  "spacing": "None"
                                }
                              ]
                            },
                            {
                              "type": "Column",
                              "width": "auto",
                              "verticalContentAlignment": "Center",
                              "items": [
                                {
                                  "type": "TextBlock",
                                  "text": "NEW RELEASE",
                                  "size": "Small",
                                  "weight": "Bolder",
                                  "color": "Light"
                                }
                              ]
                            }
                          ]
                        }
                      ]
                    },
                    {
                      "type": "ColumnSet",
                      "spacing": "Medium",
                      "columns": [
                        {
                          "type": "Column",
                          "width": "auto",
                          "items": [
                            {
                              "type": "TextBlock",
                              "text": "'"${COMPARE_INFO}"'",
                              "isSubtle": true,
                              "size": "Small"
                            }
                          ]
                        },
                        {
                          "type": "Column",
                          "width": "auto",
                          "items": [
                            {
                              "type": "TextBlock",
                              "text": "'"${ASSET_COUNT}"' artifacts",
                              "isSubtle": true,
                              "size": "Small"
                            }
                          ]
                        },
                        {
                          "type": "Column",
                          "width": "auto",
                          "items": [
                            {
                              "type": "TextBlock",
                              "text": "'"${RELEASE_DATE}"'",
                              "isSubtle": true,
                              "size": "Small"
                            }
                          ]
                        }
                      ]
                    }
                    '"${CHANGELOG_BLOCKS}"'
                    ,{
                      "type": "Container",
                      "spacing": "Medium",
                      "separator": true,
                      "items": [
                        {
                          "type": "ColumnSet",
                          "columns": [
                            {
                              "type": "Column",
                              "width": "auto",
                              "items": [
                                {
                                  "type": "TextBlock",
                                  "text": "Install: `brew install PhilipKram/tap/jenkins-cli`",
                                  "isSubtle": true,
                                  "size": "Small"
                                }
                              ]
                            }
                          ]
                        }
                      ]
                    }
                  ],
                  "actions": [
                    {
                      "type": "Action.OpenUrl",
                      "title": "View Release",
                      "url": "'"${RELEASE_URL}"'",
                      "style": "positive"
                    },
                    {
                      "type": "Action.OpenUrl",
                      "title": "Download",
                      "url": "'"${RELEASE_URL}"'#assets"
                    },
                    {
                      "type": "Action.OpenUrl",
                      "title": "Compare Changes",
                      "url": "'"${COMPARE_URL}"'"
                    }
                  ]
                }
              }]
            }'
