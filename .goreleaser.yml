version: 2

project_name: jenkins-cli

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: jenkins-cli
    main: .
    binary: jenkins-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/PhilipKram/jenkins-cli/internal/version.Version={{.Version}}

archives:
  - id: jenkins-cli-archive
    ids:
      - jenkins-cli
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: "New Features"
      regexp: '^feat(\(.+\))?!?:.+'
      order: 0
    - title: "Bug Fixes"
      regexp: '^fix(\(.+\))?!?:.+'
      order: 1
    - title: "Performance"
      regexp: '^perf(\(.+\))?!?:.+'
      order: 2
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - "Merge pull request"
      - "Merge branch"

brews:
  - name: jenkins-cli
    ids:
      - jenkins-cli-archive
    repository:
      owner: PhilipKram
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaser
      email: goreleaser@users.noreply.github.com
    directory: Formula
    homepage: "https://github.com/PhilipKram/Jenkins-CLI"
    description: "A CLI tool for controlling Jenkins from the terminal"
    license: MIT
    skip_upload: auto
    install: |
      bin.install "jenkins-cli"
    test: |
      system "#{bin}/jenkins-cli", "--version"

release:
  github:
    owner: PhilipKram
    name: Jenkins-CLI
  draft: false
  prerelease: auto
  name_template: "jenkins-cli v{{ .Version }}"
  header: |
    ## jenkins-cli v{{ .Version }}
    {{- if .PreviousTag }}

    Welcome to this new release! Here's what changed since `{{ .PreviousTag }}`.
    {{- else }}

    Welcome to the first release of jenkins-cli!
    {{- end }}
  footer: |
    ---

    ### Installation

    **Homebrew:**
    ```
    brew install PhilipKram/tap/jenkins-cli
    ```

    **npm (MCP server):**
    ```
    npx @philipkram/jenkins-cli-mcp
    ```

    **Binary:** Download the appropriate archive below for your OS/architecture.

    **Full Changelog**: https://github.com/PhilipKram/Jenkins-CLI/compare/{{ .PreviousTag }}...{{ .Tag }}
