version: 2

project_name: jenkins-cli

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: jenkins-cli
    main: .
    binary: jenkins-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/PhilipKram/jenkins-cli/internal/version.Version={{.Version}}

archives:
  - id: jenkins-cli-archive
    ids:
      - jenkins-cli
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - name: jenkins-cli
    ids:
      - jenkins-cli-archive
    repository:
      owner: PhilipKram
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/PhilipKram/Jenkins-CLI"
    description: "A CLI tool for controlling Jenkins from the terminal"
    license: "MIT"
    install: |
      bin.install "jenkins-cli"
    test: |
      assert_match "jenkins-cli version", shell_output("#{bin}/jenkins-cli --version")

release:
  github:
    owner: PhilipKram
    name: Jenkins-CLI
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
